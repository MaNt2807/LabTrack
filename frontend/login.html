<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabTrack — Iniciar Sesión</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">L</div>
    <h1>LabTrack</h1>
    <p>Ingresa tus credenciales para continuar</p>

    <div id="alerta" class="alert-custom"></div>

    <div class="form-group">
      <label class="form-label" for="inputEmail">Correo electrónico</label>
      <input type="email" id="inputEmail" class="form-control" placeholder="correo@itsr.edu.mx" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="inputPassword">Contraseña</label>
      <input type="password" id="inputPassword" class="form-control" placeholder="••••••••">
    </div>

    <button id="btnLogin" onclick="login()" style="width:100%; padding: 11px; margin-top: 6px; border: none; background: #3b82f6; color:#fff; border-radius: 8px; font-size:14px; font-weight: 600; cursor:pointer; transition: background 0.15s;">
      Ingresar al sistema
    </button>

    <p style="text-align:center; margin-top:20px; font-size:13px; color:#64748b;">
      ¿No tienes cuenta? <a href="registro.html" style="color:#3b82f6; font-weight:500;">Regístrate aquí</a>
    </p>
  </div>
</div>
<script src="./js/login.js"></script>
</body>
</html>
